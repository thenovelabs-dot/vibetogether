<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>네이버 지도 CSP 검증 — 앱인토스 WebView</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; min-height: 100vh; }

    #verdict {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 15px 16px;
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      letter-spacing: -0.3px;
    }
    .st-pending { background: #777; }
    .st-pass    { background: #1a7f48; }
    .st-fail    { background: #c0392b; }
    .st-warn    { background: #c87a00; }

    .card {
      background: #fff;
      margin: 12px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }
    .card-title {
      padding: 11px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .5px;
      border-bottom: 1px solid #f0f0f0;
    }
    .row {
      display: flex;
      align-items: center;
      padding: 11px 16px;
      gap: 10px;
      border-bottom: 1px solid #f7f7f7;
    }
    .row:last-child { border-bottom: none; }
    .row-icon { font-size: 18px; width: 22px; text-align: center; }
    .row-label { flex: 1; font-size: 13px; color: #333; line-height: 1.4; }
    .row-label small { display: block; color: #999; font-size: 11px; margin-top: 2px; }
    .row-status { font-size: 11px; color: #aaa; white-space: nowrap; }

    #map {
      margin: 0 12px;
      height: 240px;
      border-radius: 12px;
      background: #ddd;
      overflow: hidden;
    }

    .guide {
      margin: 12px;
      padding: 13px 16px;
      border-radius: 10px;
      font-size: 12.5px;
      line-height: 1.65;
    }
    .guide-fail { background: #fff0f0; color: #7b1a1a; border: 1px solid #f5c6c6; }
    .guide-pass { background: #f0fff5; color: #1a5c35; border: 1px solid #b8e8c9; }
    .guide code {
      background: rgba(0,0,0,.08);
      padding: 1px 4px;
      border-radius: 4px;
      font-size: 11px;
    }
    .guide b { font-weight: 600; }

    .note {
      margin: 12px;
      padding: 10px 14px;
      background: #fff8e1;
      border-radius: 8px;
      font-size: 11.5px;
      color: #795800;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div id="verdict" class="st-pending">⏳ CSP 검증 중…</div>

<div class="card">
  <div class="card-title">검사 항목</div>

  <!-- 1. img-src 탐침 -->
  <div class="row" id="row-img">
    <span class="row-icon" id="ic-img">⏳</span>
    <span class="row-label">
      map.pstatic.net 이미지 직접 로드
      <small>img-src CSP 허용 여부</small>
    </span>
    <span class="row-status" id="st-img">대기 중</span>
  </div>

  <!-- 2. SDK script-src -->
  <div class="row" id="row-sdk">
    <span class="row-icon" id="ic-sdk">⏳</span>
    <span class="row-label">
      네이버 지도 SDK 로드
      <small>oapi.map.naver.com script-src 허용 여부</small>
    </span>
    <span class="row-status" id="st-sdk">대기 중</span>
  </div>

  <!-- 3. tiles_loaded -->
  <div class="row" id="row-tile">
    <span class="row-icon" id="ic-tile">⏳</span>
    <span class="row-label">
      지도 타일 렌더링
      <small>SDK 초기화 후 tiles_loaded 이벤트</small>
    </span>
    <span class="row-status" id="st-tile">대기 중</span>
  </div>
</div>

<div id="map"></div>

<div class="guide" id="guide" style="display:none"></div>

<div class="note">
  ⚠️ <b>API 키 교체 필수:</b> 아래 script src의 <code>YOUR_NCP_KEY_ID</code>를
  NCP 콘솔에서 발급받은 클라이언트 ID로 바꾸세요.<br>
  키 파라미터명(<code>ncpKeyId</code> 등)은 NCP 콘솔 로더 스니펫 기준으로 확인하세요.
</div>

<!--
  ⚠️ ncpKeyId=YOUR_NCP_KEY_ID → 실제 키로 교체
  네이버 클라우드 플랫폼 콘솔 > Application > 인증 정보
-->
<script id="naver-sdk"
        src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=YOUR_NCP_KEY_ID"></script>

<script>
(function () {
  'use strict';

  /* ── 상태 ─────────────────────────────── */
  var R = { img: 'pending', sdk: 'pending', tile: 'pending' };
  var cspBlocked = {};   // domain → directive

  /* ── UI 헬퍼 ──────────────────────────── */
  function setRow(id, state, statusText) {
    var icons = { pending: '⏳', pass: '✅', fail: '❌', warn: '⚠️' };
    document.getElementById('ic-' + id).textContent = icons[state] || '⏳';
    document.getElementById('st-' + id).textContent = statusText;
    R[id] = state;
    updateVerdict();
  }

  function updateVerdict() {
    var v   = document.getElementById('verdict');
    var g   = document.getElementById('guide');
    var allDone = R.img !== 'pending' && R.sdk !== 'pending' && R.tile !== 'pending';
    var anyFail = R.img === 'fail' || R.sdk === 'fail' || R.tile === 'fail';

    if (!allDone && !anyFail) return;  // 아직 진행 중

    if (anyFail) {
      v.className = 'st-fail';
      v.textContent = '❌ FAIL — 네이버 지도 사용 불가 (CSP 차단됨)';
      g.className = 'guide guide-fail';
      g.style.display = 'block';
      var blocked = Object.keys(cspBlocked).join(', ');
      g.innerHTML =
        '<b>차단된 도메인:</b> ' + (blocked || '확인 필요') + '<br><br>' +
        '<b>조치 방법</b><br>' +
        '① 토스 담당자에게 <code>map.pstatic.net</code> / ' +
        '<code>oapi.map.naver.com</code> CSP 화이트리스트 요청<br>' +
        '② 또는 <b>카카오맵 SDK</b>로 전환 검토<br>' +
        '&nbsp;&nbsp;&nbsp;(dapi.kakao.com / map1~4.daumcdn.net)';
      return;
    }

    if (R.img === 'pass' && R.sdk === 'pass' && R.tile === 'pass') {
      v.className = 'st-pass';
      v.textContent = '✅ PASS — 네이버 지도 앱인토스 WebView 사용 가능';
      g.className = 'guide guide-pass';
      g.style.display = 'block';
      g.innerHTML =
        '<b>결과:</b> img-src / script-src 모두 허용됨. 타일 렌더링 정상.<br>' +
        '네이버 지도 SDK v3 통합 작업을 진행해도 됩니다.';
      return;
    }

    // warn 상태 (타임아웃 등)
    if (allDone) {
      v.className = 'st-warn';
      v.textContent = '⚠️ 판정 보류 — 지도 배경을 육안으로 확인하세요';
    }
  }

  /* ── CSP Violation 이벤트 (가장 정확한 감지) ── */
  document.addEventListener('securitypolicyviolation', function (e) {
    var uri = e.blockedURI || '';
    var dir = e.effectiveDirective || e.violatedDirective || '?';

    if (uri.indexOf('pstatic.net') !== -1) {
      cspBlocked['map.pstatic.net'] = dir;
      setRow('img', 'fail', 'CSP 차단 (' + dir + ')');
    }
    if (uri.indexOf('oapi.map.naver') !== -1) {
      cspBlocked['oapi.map.naver.com'] = dir;
      setRow('sdk', 'fail', 'CSP 차단 (' + dir + ')');
    }
  });

  /* ── 리소스 로드 에러 캡처 (capture phase) ── */
  window.addEventListener('error', function (e) {
    var url = (e.target && (e.target.src || e.target.href)) || '';
    if (url.indexOf('pstatic.net') !== -1 && R.tile === 'pending') {
      setRow('tile', 'fail', '타일 이미지 로드 오류');
    }
    if (url.indexOf('maps.js') !== -1 && R.sdk === 'pending') {
      setRow('sdk', 'fail', 'SDK 스크립트 로드 오류');
      setRow('tile', 'fail', 'SDK 실패로 미검사');
    }
  }, true);

  /* ── 테스트 1: img-src 직접 탐침 ─────── */
  // CSP securitypolicyviolation 이벤트가 차단을 먼저 알림.
  // onload → 성공 / onerror + CSP 이벤트 없음 → URL 오류(도메인 자체는 허용)
  var probe = new Image();
  var probeTimer = setTimeout(function () {
    if (R.img === 'pending') setRow('img', 'warn', '타임아웃 (응답 없음)');
  }, 7000);

  probe.onload = function () {
    clearTimeout(probeTimer);
    setRow('img', 'pass', 'img-src 허용됨 (이미지 수신)');
  };
  probe.onerror = function () {
    clearTimeout(probeTimer);
    // securitypolicyviolation이 이미 fail로 설정했을 수 있음
    if (R.img === 'pending') {
      // CSP는 통과, URL이 잘못됐거나 네트워크 오류
      setRow('img', 'warn', '로드 실패 (CSP 이벤트 없음 → URL/네트워크 문제)');
    }
  };
  // 타일 좌표: 줌 15, 강남역 근처
  probe.src = 'https://map.pstatic.net/v2/tiles/3/?type=bg&x=109759&y=50021&z=17&version=1&lang=ko';

  /* ── 테스트 2+3: SDK 로드 → 지도 초기화 ── */
  var sdkScript = document.getElementById('naver-sdk');

  sdkScript.addEventListener('load', function () {
    if (!(window.naver && window.naver.maps)) {
      setRow('sdk', 'fail', 'SDK 객체 없음 (키 오류?)');
      setRow('tile', 'fail', 'SDK 실패로 미검사');
      return;
    }
    setRow('sdk', 'pass', 'SDK 정상 로드됨');
    initMap();
  });

  sdkScript.addEventListener('error', function () {
    if (R.sdk === 'pending') {
      setRow('sdk', 'fail', 'script 로드 실패');
      setRow('tile', 'fail', 'SDK 실패로 미검사');
    }
  });

  // 이미 로드된 경우 대비 (캐시 히트)
  if (document.readyState === 'complete' && window.naver && window.naver.maps) {
    setRow('sdk', 'pass', 'SDK 캐시 히트');
    initMap();
  }

  function initMap() {
    var map = new naver.maps.Map('map', {
      center: new naver.maps.LatLng(37.4979, 127.0276),  // 강남역
      zoom: 15
    });

    var tileTimer = setTimeout(function () {
      if (R.tile === 'pending') setRow('tile', 'warn', '타임아웃 — 지도 배경 육안 확인 필요');
    }, 8000);

    naver.maps.Event.once(map, 'tiles_loaded', function () {
      clearTimeout(tileTimer);
      if (R.tile === 'pending') setRow('tile', 'pass', 'tiles_loaded 수신됨');
    });
  }

  /* ── 전체 타임아웃 ────────────────────── */
  setTimeout(function () {
    ['img', 'sdk', 'tile'].forEach(function (id) {
      if (R[id] === 'pending') setRow(id, 'warn', '전체 타임아웃');
    });
  }, 12000);

})();
</script>
</body>
</html>
